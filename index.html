<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown Viewer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="Markdown upload">
        <div>
          <h1>Markdown Viewer</h1>
          <p>Load a local Markdown file and preview it as formatted HTML.</p>
        </div>
        <label class="upload-button">
          <span>Upload .md</span>
          <input id="file-input" type="file" accept=".md,.markdown,text/markdown,text/plain" />
        </label>
      </section>

      <section class="workspace">
        <article id="preview" class="preview" aria-live="polite">
          <h2>Ready to preview Markdown</h2>
          <p>Upload a .md or .markdown file to see formatted headings, lists, links and code blocks here.</p>
          <div class="examples" aria-label="Example Markdown documents">
            <h3>Try an example</h3>
            <div class="example-actions">
              <button type="button" data-example="release-notes">Release notes</button>
              <button type="button" data-example="project-plan">Project plan</button>
              <button type="button" data-example="technical-note">Technical note</button>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
